<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminous Chat</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #121212; color: white; }
        #chat-window { height: 300px; overflow-y: auto; border: 1px solid #444; padding: 10px; margin-bottom: 10px; background: #1e1e1e; }
        .msg { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        input { width: 80%; padding: 10px; background: #333; color: white; border: 1px solid #555; }
        button { padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>

    <h2>Luminous Wear Chat</h2>
    <div id="chat-window"></div>

     <form id="chat-form">
        <input type="text" id="msg-input" placeholder="..." autocomplete="off" required>
        <button type="submit">Send</button>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Your actual Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyALbEZi989fwjUtgKuxq4dstD0QHvfR3Ns",
            authDomain: "luminous-chat.firebaseapp.com",
            projectId: "luminous-chat",
            storageBucket: "luminous-chat.firebasestorage.app",
            messagingSenderId: "1025432117856",
            appId: "1:1025432117856:web:2cb91b579ceb6fa4c65905",
            measurementId: "G-G5Y82DC8NY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const chatCol = collection(db, "Chat"); // Using your "Chat" collection

        
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const msgInput = document.getElementById('msg-input');

        // Send message to Firestore
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(chatCol, {
                text: msgInput.value,
                sentAt: serverTimestamp()
            });
            chatForm.reset();
        });

        // Listen for messages
        const q = query(chatCol, orderBy('sentAt', 'asc'));
        onSnapshot(q, (snapshot) => {
            chatWindow.innerHTML = '';
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                if(data.text) {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.textContent = data.text;
                    chatWindow.appendChild(div);
                }
            });
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });
    </script>
</body>
</html>
